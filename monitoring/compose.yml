services:
  grafana:
    image: grafana/grafana-oss:12.0.2
    container_name: grafana
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    mem_reservation: 256m
    ports:
      - "${GRAFANA_PORT:-4000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-Grafana}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GF_SERVER_SERVE_FROM_SUB_PATH:-false}
    networks:
      - monitor
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro

  loki:
    image: grafana/loki:3.6.7
    container_name: loki
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 1g
    mem_reservation: 512m
    expose:
      - "3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    environment:
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-720h}
      LOKI_MAX_QUERY_LOOKBACK: ${LOKI_MAX_QUERY_LOOKBACK:-720h}
    command:
      - -config.file=/etc/loki/local-config.yaml
      - -config.expand-env=true
    networks:
      - monitor

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: prometheus
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 1g
    mem_reservation: 512m
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    depends_on:
      - victoriametrics
    networks:
      - monitor

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.117.1
    container_name: victoriametrics
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 1g
    mem_reservation: 512m
    ports:
      - "${VICTORIAMETRICS_PORT:-8428}:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=${VICTORIAMETRICS_RETENTION:-12}
      - -httpListenAddr=:8428
    networks:
      - monitor

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: otel-collector
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 256m
    mem_reservation: 128m
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    expose:
      - "9464"
    volumes:
      - ./config/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - tempo
    networks:
      - monitor

  tempo:
    image: grafana/tempo:2.8.1
    container_name: tempo
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 512m
    mem_reservation: 256m
    expose:
      - "3200"
      - "4317"
      - "4318"
    volumes:
      - ./config/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    environment:
      TEMPO_TRACE_RETENTION: ${TEMPO_TRACE_RETENTION:-168h}
    command:
      - -config.file=/etc/tempo.yml
      - -config.expand-env=true
    networks:
      - monitor

networks:
  monitor:
    name: monitoring
    external: true

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  victoriametrics-data:
  tempo-data:
