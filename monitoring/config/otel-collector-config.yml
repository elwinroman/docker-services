receivers:
  otlp:
    protocols:
      # Entrada OTLP gRPC. Útil para SDKs o agentes que prefieren gRPC.
      grpc:
        endpoint: 0.0.0.0:4317
      # Entrada OTLP HTTP. Recomendado para apps Node por simplicidad.
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    # Protege el collector para no exceder el límite del contenedor.
    check_interval: 5s
    limit_mib: 192
    spike_limit_mib: 64
  batch:
    # Agrupa datos antes de exportar para reducir overhead.
    timeout: 5s
    send_batch_size: 1024

exporters:
  prometheus:
    # Endpoint que Prometheus scrapea para leer métricas recibidas por OTLP.
    endpoint: 0.0.0.0:9464
  otlp/tempo:
    # Envío de traces a Tempo dentro de la red Docker.
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    # Apps -> OTLP -> Collector -> endpoint Prometheus :9464 -> Prometheus scrape.
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    # Apps -> OTLP -> Collector -> Tempo.
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
